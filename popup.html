<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeShift</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 350px;
            min-height: 420px;
            margin: 0;
            padding: 16px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow-y: auto;
        }

        /* ---- Title ---- */
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
            margin: 0 0 4px 0;
        }
        .subtitle {
            text-align: center;
            font-size: 11px;
            opacity: 0.6;
            margin: 0 0 14px 0;
            letter-spacing: 0.5px;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            opacity: 0.3;
            padding: 8px 0 4px;
        }
        .title-time {
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .title-shift {
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ---- Input row ---- */
        .input-row {
            position: relative;
            margin-bottom: 14px;
        }

        .input-row input {
            width: 100%;
            height: 40px;
            padding: 0 72px 0 14px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.95);
            color: #1f2937;
            font-size: 14px;
            outline: none;
            transition: box-shadow 0.2s;
        }

        .input-row input:focus {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5);
        }

        .input-row input::placeholder {
            color: #9ca3af;
        }

        .now-btn {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            height: 32px;
            padding: 0 12px;
            border: none;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.12);
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .now-btn:hover {
            background: rgba(102, 126, 234, 0.22);
        }

        /* ---- From/To pill row ---- */
        .tz-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tz-pill {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            user-select: none;
        }

        .tz-pill:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .tz-pill-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.6;
            margin-bottom: 3px;
        }

        .tz-pill-line1 {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tz-pill-line2 {
            font-size: 11px;
            opacity: 0.55;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tz-arrow {
            flex-shrink: 0;
            font-size: 16px;
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.2s;
            user-select: none;
        }
        .tz-arrow:hover {
            opacity: 1;
            transform: scale(1.2);
        }
        .tz-arrow:active {
            transform: scale(1.2) rotate(180deg);
        }

        /* ---- Result area ---- */
        .result-area {
            display: none;
            text-align: center;
            padding: 16px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            margin-bottom: 10px;
            position: relative;
        }

        .result-area.show {
            display: block;
        }

        .result-area.error {
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.3);
        }

        .result-converted-time {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .day-diff {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
            padding: 2px 8px;
            border-radius: 8px;
            letter-spacing: 0;
            margin-top: 2px;
        }

        .result-date {
            font-size: 13px;
            opacity: 0.75;
            margin-bottom: 6px;
        }

        .result-tz-name {
            font-size: 11px;
            opacity: 0.55;
            margin-bottom: 10px;
        }

        .result-original {
            font-size: 12px;
            opacity: 0.6;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-original-time {
            font-weight: 600;
            opacity: 0.8;
        }

        .result-range-time {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 11px;
            line-height: 1;
            transition: all 0.15s;
            display: none;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .copy-btn.visible {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .copy-btn svg {
            width: 12px;
            height: 12px;
        }

        /* ---- Confidence text ---- */
        .confidence-text {
            display: none;
            text-align: center;
            font-size: 11px;
            opacity: 0.55;
            padding: 0 8px 8px;
        }

        .confidence-text.show {
            display: block;
        }

        /* ---- Error/info messages inside result ---- */
        .result-error-title {
            color: #fbbf24;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-error-body {
            font-size: 13px;
            line-height: 1.5;
            text-align: left;
            opacity: 0.85;
        }

        /* ---- Search panel overlay ---- */
        .search-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.97);
            z-index: 9999;
            flex-direction: column;
            color: #1f2937;
        }

        .search-panel.open {
            display: flex;
        }

        .search-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .search-panel-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
        }

        .search-panel-close {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: #f3f4f6;
            color: #6b7280;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .search-panel-close:hover {
            background: #e5e7eb;
        }

        .search-panel-input-wrap {
            padding: 10px 16px;
        }

        .search-panel-input {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            color: #1f2937;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-panel-input:focus {
            border-color: #667eea;
        }

        .search-panel-input::placeholder {
            color: #9ca3af;
        }

        .search-panel-results {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 12px;
        }

        .search-group-header {
            padding: 6px 16px;
            background: #f9fafb;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #9ca3af;
            border-bottom: 1px solid #f3f4f6;
        }

        .search-result-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            transition: background 0.1s;
        }

        .search-result-item:hover {
            background: #f3f4f6;
        }

        .search-result-line1 {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
        }

        .search-result-line1 .offset {
            font-weight: 400;
            color: #9ca3af;
            margin-left: 4px;
        }

        .search-result-line2 {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 1px;
        }

        .search-result-line1 mark {
            background: rgba(102, 126, 234, 0.18);
            color: inherit;
            border-radius: 2px;
            padding: 0 1px;
        }

        .search-result-line2 mark {
            background: rgba(102, 126, 234, 0.12);
            color: inherit;
            border-radius: 2px;
            padding: 0 1px;
        }

        .search-no-results {
            padding: 24px 16px;
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
        }
        .search-more-btn {
            padding: 4px 16px 4px 20px;
            font-size: 11px;
            color: #6366f1;
            cursor: pointer;
            user-select: none;
        }
        .search-more-btn:hover {
            color: #4f46e5;
            text-decoration: underline;
        }
        .search-more-items {
            border-left: 2px solid #e5e7eb;
            margin-left: 16px;
        }
    </style>
</head>
<body>
    <h1 class="title"><span class="title-time">Time</span><span class="title-shift">Shift</span></h1>
    <p class="subtitle">Global Timezone Converter</p>

    <div class="input-row">
        <input type="text" id="dateTimeInput" placeholder="Enter date/time..." autocomplete="off">
        <button class="now-btn" id="nowBtn" title="Fill current time">Now</button>
    </div>

    <div class="tz-row">
        <div class="tz-pill" id="fromPill" role="button" tabindex="0" aria-label="Select source timezone">
            <div class="tz-pill-label">From</div>
            <div class="tz-pill-line1" id="fromLine1">Auto-detect</div>
            <div class="tz-pill-line2" id="fromLine2">&nbsp;</div>
        </div>
        <span class="tz-arrow" id="swapArrow" role="button" tabindex="0" title="Swap timezones">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="7 16 3 12 7 8"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <polyline points="17 8 21 12 17 16"/>
            </svg>
        </span>
        <div class="tz-pill" id="toPill" role="button" tabindex="0" aria-label="Select target timezone">
            <div class="tz-pill-label">To</div>
            <div class="tz-pill-line1" id="toLine1">Auto-detect</div>
            <div class="tz-pill-line2" id="toLine2">&nbsp;</div>
        </div>
    </div>

    <div class="result-area" id="resultArea">
        <button class="copy-btn" id="copyBtn" title="Copy result">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="5" width="9" height="9" rx="1.5"/>
                <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
            </svg>
            <span id="copyBtnText">Copy</span>
        </button>
        <div id="resultContent"></div>
    </div>

    <div class="confidence-text" id="confidenceText"></div>

    <!-- Timezone search panel overlay -->
    <div class="search-panel" id="searchPanel" role="dialog" aria-modal="true" aria-label="Select timezone">
        <div class="search-panel-header">
            <span class="search-panel-title" id="searchPanelTitle">SELECT TIMEZONE</span>
            <button class="search-panel-close" id="searchPanelClose" aria-label="Close">&times;</button>
        </div>
        <div class="search-panel-input-wrap">
            <input type="text" class="search-panel-input" id="searchPanelInput" placeholder="Search city, country, timezone..." autocomplete="off">
        </div>
        <div class="search-panel-results" id="searchPanelResults"></div>
    </div>

    <div class="footer">v2.2.0</div>

    <script src="libs/chrono.bundle.js"></script>
    <script src="popup.js"></script>
</body>
</html>
