<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeShift</title>
    <style>
        body {
            width: 350px;
            min-height: 520px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow-y: auto;
            box-sizing: border-box;
        }
        
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .header h1 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            opacity: 0.8;
        }
        
        .converter-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 12px;
            position: relative;
            z-index: 1000;
        }
        
        .input-group {
            margin-bottom: 12px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
            opacity: 0.9;
        }

        .input-group input {
            width: 100%;
            padding: 8px 36px 8px 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 13px;
            box-sizing: border-box;
            height: 32px;
            transition: all 0.2s ease;
        }

        .now-btn {
            position: absolute;
            right: 4px;
            bottom: 2px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.45;
            transition: opacity 0.2s ease, background 0.2s ease;
        }

        .now-btn:hover {
            opacity: 0.75;
            background: rgba(0, 0, 0, 0.06);
        }

        .now-btn svg {
            width: 16px;
            height: 16px;
        }
        
        .input-group input:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-1px);
        }
        
        .timezone-group {
            margin-bottom: 12px;
        }
        
        .timezone-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
            opacity: 0.9;
        }
        
        .dropdown-container {
            position: relative;
            z-index: 10000;
        }
        
        #fromTimezoneContainer {
            z-index: 30000;
        }
        
        #toTimezoneContainer {
            z-index: 20000;
        }
        
        .dropdown-trigger {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 13px;
            box-sizing: border-box;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 32px;
            transition: all 0.2s ease;
        }
        
        .dropdown-trigger:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-1px);
        }
        
        .dropdown-arrow {
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid #666;
            transition: transform 0.2s ease;
        }
        
        .dropdown-trigger.open .dropdown-arrow {
            transform: rotate(180deg);
        }
        
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 99999;
            max-height: 180px;
            overflow-y: auto;
            display: none;
        }
        
        .dropdown-menu.open {
            display: block;
        }
        
        #fromTimezoneMenu {
            z-index: 30001;
        }
        
        #toTimezoneMenu {
            z-index: 20001;
        }
        
        .dropdown-search {
            padding: 10px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 30002;
        }
        
        .dropdown-search input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }
        
        .dropdown-options {
            max-height: 140px;
            overflow-y: auto;
        }
        
        .dropdown-option {
            padding: 8px 12px;
            color: #333;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f5f5f5;
            transition: background-color 0.1s ease;
        }

        .dropdown-option .tz-long-name {
            display: block;
            font-size: 11px;
            color: #888;
            margin-top: 1px;
        }
        
        .dropdown-option:hover {
            background-color: #f8f9fa;
        }
        
        .dropdown-option:last-child {
            border-bottom: none;
        }
        
        .dropdown-option.special {
            padding: 10px 12px;
            font-weight: 500;
            color: #333;
            background-color: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .dropdown-group-header {
            padding: 6px 12px;
            background-color: #f0f1f3;
            color: #6b7280;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-top: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
            cursor: default;
            user-select: none;
        }

        .dropdown-group-header:first-child {
            border-top: none;
        }

        .dropdown-separator {
            padding: 8px 12px;
            background-color: #f8f9fa;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            border-top: 1px solid #e9ecef;
            border-bottom: 1px solid #e9ecef;
            margin: 2px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .dropdown-separator.first-region {
            border-top: none;
            margin-top: 0;
        }
        
        .region-label {
            font-size: 11px;
            font-weight: 700;
            color: #495057;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 11px;
            line-height: 1;
            transition: all 0.2s ease;
            display: none;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .copy-btn.visible {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .copy-btn svg {
            width: 12px;
            height: 12px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        
        .result {
            position: relative;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(15px);
            font-size: 13px;
            line-height: 1.4;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.error {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.3);
        }
        
        .instructions {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: -1;
        }
        
        .instructions h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .instructions p {
            margin: 0;
            font-size: 12px;
            opacity: 0.85;
            line-height: 1.4;
        }

        .confidence-bar {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: #f59e0b;
        }
        .confidence-change-btn {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.4);
            border-radius: 4px;
            color: #f59e0b;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 11px;
        }
        .confidence-change-btn:hover {
            background: rgba(245, 158, 11, 0.3);
        }

    </style>
</head>
<body>
    <div class="header">
        <h1>TimeShift</h1>
        <p>Convert time across global timezones instantly</p>
    </div>

    <div class="result" id="result">
        <button class="copy-btn" id="copyBtn" title="Copy result">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="5" width="9" height="9" rx="1.5"/>
                <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
            </svg>
            <span id="copyBtnText">Copy</span>
        </button>
    </div>

    <div id="confidenceBar" class="confidence-bar" style="display: none;">
        <span id="confidenceText"></span>
        <button id="confidenceChangeBtn" class="confidence-change-btn">Change &#9662;</button>
    </div>

    <div class="converter-section">
        <div class="input-group">
            <label for="dateTimeInput">Enter Date/Time:</label>
            <input type="text" id="dateTimeInput" placeholder="e.g., Tuesday, Sep 2, 2025 12:00 PM">
            <button class="now-btn" id="nowBtn" title="Fill current time">
                <svg viewBox="0 0 16 16" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="8" r="6.5"/>
                    <polyline points="8,4 8,8 11,10"/>
                </svg>
            </button>
        </div>
        
        <div class="timezone-group">
            <label>From Timezone:</label>
            <div class="dropdown-container" id="fromTimezoneContainer">
                <div class="dropdown-trigger" id="fromTimezoneDropdown">
                    <span class="selected-text">Auto-detect</span>
                    <div class="dropdown-arrow"></div>
                </div>
                <div class="dropdown-menu" id="fromTimezoneMenu">
                    <div class="dropdown-search">
                        <input type="text" placeholder="Search country, city or timezone..." id="fromTimezoneSearch">
                    </div>
                    <div class="dropdown-options" id="fromTimezoneOptions"></div>
                </div>
            </div>
        </div>

        <div class="timezone-group">
            <label>To Timezone:</label>
            <div class="dropdown-container" id="toTimezoneContainer">
                <div class="dropdown-trigger" id="toTimezoneDropdown">
                    <span class="selected-text">Auto-detect</span>
                    <div class="dropdown-arrow"></div>
                </div>
                <div class="dropdown-menu" id="toTimezoneMenu">
                    <div class="dropdown-search">
                        <input type="text" placeholder="Search country, city or timezone..." id="toTimezoneSearch">
                    </div>
                    <div class="dropdown-options" id="toTimezoneOptions"></div>
                </div>
            </div>
        </div>
        
        <button class="btn" id="convertBtn">Convert Time</button>
    </div>
    
    <div class="instructions">
        <h3>How to Use</h3>
        <p>Right-click on any date/time text on websites and select "Convert Time" from the context menu, or use this popup for manual conversion.</p>
    </div>
    
    <script src="libs/chrono.bundle.js"></script>
    <script src="popup.js"></script>
</body>
</html>
